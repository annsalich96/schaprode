<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHAPRODE — Netzwerk</title>
    <style>
        @font-face { font-family: 'Rota'; src: url('../DESIGN RULES/FONTS/Rota Complete Family/Rota-Light.otf') format('opentype'); font-weight: 300; font-style: normal; }
        @font-face { font-family: 'Rota'; src: url('../DESIGN RULES/FONTS/Rota Complete Family/Rota-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; }
        @font-face { font-family: 'Rota'; src: url('../DESIGN RULES/FONTS/Rota Complete Family/Rota-Medium.otf') format('opentype'); font-weight: 500; font-style: normal; }
        @font-face { font-family: 'Rota'; src: url('../DESIGN RULES/FONTS/Rota Complete Family/Rota-SemiBold.otf') format('opentype'); font-weight: 600; font-style: normal; }
        @font-face { font-family: 'Rota'; src: url('../DESIGN RULES/FONTS/Rota Complete Family/Rota-Bold.otf') format('opentype'); font-weight: 700; font-style: normal; }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black:    #0A0A0A;
            --white:    #FFFFFF;
            --gray-100: #F5F5F3;
            --gray-200: #E0DDD8;
            --gray-400: #C8C5BF;
            --gray-600: #8C8C8C;
            --success:  #4A7C59;
            --error:    #B0291E;
            --font:     'Rota', -apple-system, BlinkMacSystemFont, sans-serif;
            --margin:   64px;
            --gutter:   48px;
        }

        body {
            font-family: var(--font);
            background: var(--white);
            color: var(--black);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─────────────────────────────
           GRID — 4 Spalten, gleiche Basis
           wie DESIGN RULES/tokens.css
        ───────────────────────────── */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            column-gap: var(--gutter);
            padding: 0 var(--margin);
        }

        .col-2 { grid-column: span 2; }
        .col-4 { grid-column: span 4; }

        /* ── Header ── */
        header {
            padding: 28px var(--margin);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo img { height: 32px; width: auto; display: block; }

        .logo-name {
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gray-600);
        }

        /* ── Form-Sektion ── */
        #formSection .grid { padding-top: 80px; padding-bottom: 96px; }

        .page-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--gray-600);
            margin-bottom: 24px;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.15;
            margin-bottom: 28px;
        }

        .page-desc {
            font-size: 15px;
            color: var(--gray-600);
            line-height: 1.75;
        }

        /* ── Formular — benutzt die selben Spaltenbreiten wie das Grid ── */
        .form-group { margin-bottom: 36px; }

        /* 2 nebeneinander = Spalte 3 + Spalte 4 des Haupt-Grids */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: var(--gutter);
        }

        label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--gray-600);
            margin-bottom: 12px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1px solid var(--gray-200);
            background: transparent;
            font-size: 15px;
            font-family: inherit;
            color: var(--black);
            outline: none;
            transition: border-color 0.15s;
            border-radius: 0;
            -webkit-appearance: none;
        }

        input::placeholder, textarea::placeholder { color: var(--gray-400); }
        input:focus, textarea:focus { border-bottom-color: var(--black); }

        textarea { resize: vertical; min-height: 100px; line-height: 1.65; }

        .submit-row {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-top: 8px;
        }

        button[type="submit"] {
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 16px 40px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.15s;
        }
        button[type="submit"]:hover    { opacity: 0.65; }
        button[type="submit"]:disabled { opacity: 0.35; cursor: not-allowed; }

        .status         { font-size: 13px; color: var(--gray-600); }
        .status.success { color: var(--success); }
        .status.error   { color: var(--error); }

        /* ── Einträge — gleicher Grid, selbe Spaltenlinien ── */
        .entries-section { border-top: 1px solid var(--gray-200); flex: 1; }

        /* Header-Zeile: "Netzwerk" + Personenanzahl */
        .entries-head {
            padding-top: 64px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 0;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
        }

        .entries-head h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .entry-count {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gray-600);
        }

        /* Spalten-Header der Eintrags-Liste */
        .entry-col-header {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gray-600);
            padding: 20px 0 16px;
        }

        /* Eintrags-Zeilen — span 4, inneres Grid */
        .entry-row {
            grid-column: span 4;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            column-gap: var(--gutter);
            border-top: 1px solid var(--gray-100);
        }

        /* Eintrags-Zellen — jede in einer Grid-Spalte */
        .entry-cell {
            font-size: 14px;
            color: var(--black);
            padding: 20px 0;
            line-height: 1.55;
        }

        .entry-cell.muted {
            color: var(--black);
            font-size: 13px;
        }

        .name-cell {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
        }

        /* Bearbeiten-Button */
        .edit-btn {
            background: none;
            border: none;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gray-400);
            cursor: pointer;
            font-family: inherit;
            padding: 0;
            flex-shrink: 0;
            transition: color 0.15s;
        }
        .edit-btn:hover { color: var(--black); }

        /* Inline-Editformular */
        .entry-edit-form {
            display: none;
            grid-column: span 4;
            padding: 24px 0 28px;
        }
        .entry-row.editing > .entry-cell { display: none; }
        .entry-row.editing .entry-edit-form { display: block; }

        .save-btn {
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 14px 36px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.15s;
        }
        .save-btn:hover    { opacity: 0.65; }
        .save-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        .cancel-btn {
            background: none;
            border: none;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gray-600);
            cursor: pointer;
            font-family: inherit;
            padding: 0;
            transition: color 0.15s;
        }
        .cancel-btn:hover { color: var(--black); }

        .entries-status {
            grid-column: span 4;
            font-size: 14px;
            color: var(--gray-600);
            padding: 40px 0;
        }

        /* ── Footer ── */
        footer {
            padding: 24px var(--margin);
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gray-600);
            margin-top: 64px;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            :root { --margin: 40px; --gutter: 32px; }
            .grid { grid-template-columns: repeat(2, 1fr); }
            .col-2 { grid-column: span 2; }
            .col-4 { grid-column: span 2; }
            h1 { font-size: 28px; }
        }

        @media (max-width: 560px) {
            :root { --margin: 20px; --gutter: 24px; }
            .grid { grid-template-columns: 1fr; }
            .col-2, .col-4 { grid-column: span 1; }
            .form-row { grid-template-columns: 1fr; }
            .entry-col-header:nth-child(n+3),
            .entry-cell:nth-child(4n+3),
            .entry-cell:nth-child(4n)   { display: none; }
            footer { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="Monogram.png" alt="ANN Architecture Solution"></div>
    <div class="logo-name">ANN Architecture Solution</div>
</header>

<!-- Form-Sektion -->
<div id="formSection">
    <div class="grid">
        <!-- Spalte 1+2: Titel & Beschreibung -->
        <div class="col-2">
            <p class="page-label">Schaprode · Ausstellungsdesign · 2026</p>
            <h1>Hier sammeln wir alle relevanten Informationen für die Ausstellung.</h1>
            <p class="page-desc">Lass uns wissen, welches Wissen du beitragen kannst.</p>
        </div>

        <!-- Spalte 3+4: Formular -->
        <div class="col-2">
            <form id="networkForm">
                <!-- Zeile 1: Name | E-Mail  →  Spalte 3 | Spalte 4 -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Vollständiger Name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">E-Mail</label>
                        <input type="email" id="email" name="email" placeholder="deine@email.de" required>
                    </div>
                </div>

                <!-- Zeile 2: Telefon | Berufsfeld  →  Spalte 3 | Spalte 4 -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Telefon</label>
                        <input type="tel" id="phone" name="phone" placeholder="+49 …">
                    </div>
                    <div class="form-group">
                        <label for="field">Berufsfeld</label>
                        <input type="text" id="field" name="field" placeholder="z.B. Historiker, Finder …" required>
                    </div>
                </div>

                <!-- Zeile 3: Beitrag — volle Breite von Spalte 3+4 -->
                <div class="form-group">
                    <label for="contribution">Was kann ich beitragen</label>
                    <textarea id="contribution" name="contribution"
                        placeholder="Beschreibe kurz, womit du das Projekt bereichern kannst …" required></textarea>
                </div>

                <div class="submit-row">
                    <button type="submit" id="submitBtn">Eintragen</button>
                    <span class="status" id="statusMsg"></span>
                </div>
            </form>
        </div>
    </div>
</div>


<!-- Einträge — gleicher Grid wie oben -->
<section class="entries-section">
    <!-- Header-Zeile im Grid -->
    <div class="grid">
        <div class="col-4 entries-head">
            <h2>Beteiligte</h2>
            <span class="entry-count" id="entryCount"></span>
        </div>
    </div>

    <!-- Einträge-Grid: Spaltenheader + Zeilen, gleiche Linien wie oben -->
    <div class="grid" id="entriesContainer">
        <p class="entries-status">Wird geladen …</p>
    </div>
</section>

<footer>
    <span>&copy; 2026 ANN Architecture Solution</span>
    <span>Projekt Schaprode</span>
</footer>

<script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzFkNJDCXOfx3gOLhhbdbdQRFYqnJfSSJHTUyDS-WeJwcNbo8rSOWz7Dl_xx8rPd2K5/exec';

    const form      = document.getElementById('networkForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        statusMsg.textContent = 'Wird gespeichert …';
        statusMsg.className = 'status';

        const payload = {
            timestamp:    new Date().toLocaleString('de-DE'),
            name:         document.getElementById('name').value.trim(),
            email:        document.getElementById('email').value.trim(),
            phone:        document.getElementById('phone').value.trim(),
            field:        document.getElementById('field').value.trim(),
            contribution: document.getElementById('contribution').value.trim()
        };

        try {
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            form.reset();
            submitBtn.disabled = false;
            statusMsg.textContent = 'Eingetragen.';
            statusMsg.className = 'status success';
            loadEntries();

        } catch (err) {
            statusMsg.textContent = 'Verbindungsfehler — bitte versuche es erneut.';
            statusMsg.className = 'status error';
            submitBtn.disabled = false;
        }
    });

    function esc(str) {
        if (!str) return '—';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function renderEntries(data) {
        const container = document.getElementById('entriesContainer');
        const countEl   = document.getElementById('entryCount');

        if (!data || data.length === 0) {
            container.innerHTML = '<p class="entries-status">Noch keine Einträge.</p>';
            countEl.textContent = '';
            return;
        }

        countEl.textContent = data.length + (data.length === 1 ? ' Person' : ' Personen');

        let html =
            '<div class="entry-col-header">Name</div>' +
            '<div class="entry-col-header">Berufsfeld</div>' +
            '<div class="entry-col-header">E-Mail</div>' +
            '<div class="entry-col-header">Beitrag</div>';

        [...data].reverse().forEach(row => {
            html += `
            <div class="entry-row" data-original-email="${esc(row.email)}">
                <div class="entry-cell name-cell">
                    <span>${esc(row.name)}</span>
                    <button class="edit-btn" onclick="startEdit(this)">Bearbeiten</button>
                </div>
                <div class="entry-cell muted">${esc(row.field)}</div>
                <div class="entry-cell muted">${esc(row.email)}</div>
                <div class="entry-cell muted">${esc(row.contribution)}</div>
                <div class="entry-edit-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" class="edit-name" value="${esc(row.name)}">
                        </div>
                        <div class="form-group">
                            <label>E-Mail</label>
                            <input type="email" class="edit-email" value="${esc(row.email)}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Telefon</label>
                            <input type="tel" class="edit-phone" value="${esc(row.phone || '')}">
                        </div>
                        <div class="form-group">
                            <label>Berufsfeld</label>
                            <input type="text" class="edit-field" value="${esc(row.field)}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Was ich beitragen kann</label>
                        <textarea class="edit-contribution">${esc(row.contribution)}</textarea>
                    </div>
                    <div class="submit-row">
                        <button class="save-btn" onclick="saveEdit(this)">Speichern</button>
                        <button class="cancel-btn" type="button" onclick="cancelEdit(this)">Abbrechen</button>
                        <span class="edit-status status"></span>
                    </div>
                </div>
            </div>`;
        });

        container.innerHTML = html;
    }

    function startEdit(btn) {
        btn.closest('.entry-row').classList.add('editing');
    }

    function cancelEdit(btn) {
        btn.closest('.entry-row').classList.remove('editing');
    }

    async function saveEdit(btn) {
        const row      = btn.closest('.entry-row');
        const statusEl = row.querySelector('.edit-status');
        btn.disabled   = true;
        statusEl.textContent = 'Wird gespeichert …';
        statusEl.className   = 'edit-status status';

        const payload = {
            action:        'update',
            originalEmail: row.dataset.originalEmail,
            name:          row.querySelector('.edit-name').value.trim(),
            email:         row.querySelector('.edit-email').value.trim(),
            phone:         row.querySelector('.edit-phone').value.trim(),
            field:         row.querySelector('.edit-field').value.trim(),
            contribution:  row.querySelector('.edit-contribution').value.trim()
        };

        try {
            await fetch(APPS_SCRIPT_URL, {
                method:  'POST',
                mode:    'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload)
            });
            row.classList.remove('editing');
            setTimeout(loadEntries, 1200);
        } catch (err) {
            statusEl.textContent = 'Fehler — bitte erneut versuchen.';
            statusEl.className   = 'edit-status status error';
            btn.disabled = false;
        }
    }

    async function loadEntries() {
        const container = document.getElementById('entriesContainer');
        try {
            const res  = await fetch('https://docs.google.com/spreadsheets/d/1HVc33FkfOxlVnrJ7hxp5e43JXIOD4g4OTpibIBCE3zQ/gviz/tq?tqx=out:json');
            const text = await res.text();
            const json = text.slice(text.indexOf('{'), text.lastIndexOf('}') + 1);
            const gviz = JSON.parse(json);
            const val  = (cell) => cell ? (cell.f || String(cell.v || '')) : '';
            const data = ((gviz.table || {}).rows || []).map(row => ({
                timestamp:    val(row.c[0]),
                name:         val(row.c[1]),
                email:        val(row.c[2]),
                phone:        val(row.c[3]),
                field:        val(row.c[4]),
                contribution: val(row.c[5])
            }));
            renderEntries(data);
        } catch (err) {
            container.innerHTML = '<p class="entries-status">Fehler beim Laden.</p>';
        }
    }

    loadEntries();
</script>

</body>
</html>
