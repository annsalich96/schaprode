<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHAPRODE — Netzwerk</title>
    <style>
        @font-face { font-family: 'Rota'; src: url('../DESIGN RULES/FONTS/Rota Complete Family/Rota-Light.otf') format('opentype'); font-weight: 300; font-style: normal; }
        @font-face { font-family: 'Rota'; src: url('../DESIGN RULES/FONTS/Rota Complete Family/Rota-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; }
        @font-face { font-family: 'Rota'; src: url('../DESIGN RULES/FONTS/Rota Complete Family/Rota-Medium.otf') format('opentype'); font-weight: 500; font-style: normal; }
        @font-face { font-family: 'Rota'; src: url('../DESIGN RULES/FONTS/Rota Complete Family/Rota-SemiBold.otf') format('opentype'); font-weight: 600; font-style: normal; }
        @font-face { font-family: 'Rota'; src: url('../DESIGN RULES/FONTS/Rota Complete Family/Rota-Bold.otf') format('opentype'); font-weight: 700; font-style: normal; }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black:    #0A0A0A;
            --white:    #FFFFFF;
            --gray-100: #F5F5F3;
            --gray-200: #E0DDD8;
            --gray-400: #C8C5BF;
            --gray-600: #8C8C8C;
            --success:  #4A7C59;
            --error:    #B0291E;
            --font:     'Rota', -apple-system, BlinkMacSystemFont, sans-serif;
            --margin:   64px;
            --gutter:   48px;
        }

        body {
            font-family: var(--font);
            background: var(--white);
            color: var(--black);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            padding: 28px var(--margin);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo img {
            height: 32px;
            width: auto;
            display: block;
        }

        .logo-name {
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gray-600);
        }

        /* ── Main — 2+2 Layout ── */
        main {
            flex: 1;
            padding: 80px var(--margin) 96px;
        }

        .form-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--gutter);
            align-items: start;
        }

        /* ── Links: Titel + Beschreibung ── */
        .page-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--gray-600);
            margin-bottom: 24px;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.15;
            margin-bottom: 28px;
        }

        .page-desc {
            font-size: 15px;
            color: var(--gray-600);
            line-height: 1.75;
            max-width: 340px;
        }

        /* ── Rechts: Formular ── */
        .form-group { margin-bottom: 36px; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 var(--gutter);
        }

        label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--gray-600);
            margin-bottom: 12px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1px solid var(--gray-200);
            background: transparent;
            font-size: 15px;
            font-family: inherit;
            color: var(--black);
            outline: none;
            transition: border-color 0.15s;
            border-radius: 0;
            -webkit-appearance: none;
        }

        input::placeholder, textarea::placeholder { color: var(--gray-400); }
        input:focus, textarea:focus { border-bottom-color: var(--black); }

        textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.65;
        }

        .submit-row {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-top: 8px;
        }

        button[type="submit"] {
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 16px 40px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.15s;
        }
        button[type="submit"]:hover    { opacity: 0.65; }
        button[type="submit"]:disabled { opacity: 0.35; cursor: not-allowed; }

        .status             { font-size: 13px; color: var(--gray-600); }
        .status.success     { color: var(--success); }
        .status.error       { color: var(--error); }

        /* ── Danke-Seite ── */
        #successScreen {
            display: none;
            padding: 48px 0;
        }

        #successScreen h2 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.15;
            margin-bottom: 20px;
        }

        #successScreen p {
            font-size: 15px;
            color: var(--gray-600);
            line-height: 1.75;
        }

        /* ── Einträge ── */
        .entries-section {
            border-top: 1px solid var(--gray-200);
            padding: 64px var(--margin) 96px;
        }

        .entries-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--gray-200);
        }

        .entries-header h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .entry-count {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gray-600);
        }

        .entries-table {
            width: 100%;
            border-collapse: collapse;
        }

        .entries-table th {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gray-600);
            text-align: left;
            padding: 20px 32px 16px 0;
        }

        .entries-table td {
            font-size: 14px;
            padding: 20px 32px 20px 0;
            border-top: 1px solid var(--gray-100);
            vertical-align: top;
            line-height: 1.55;
        }

        .entries-table td.muted {
            color: var(--gray-600);
            font-size: 13px;
        }

        .entries-status {
            font-size: 14px;
            color: var(--gray-600);
            padding: 40px 0;
        }

        /* ── Footer ── */
        footer {
            padding: 24px var(--margin);
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gray-600);
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            :root { --margin: 40px; --gutter: 32px; }
            .form-section { grid-template-columns: 1fr; gap: 56px; }
            .page-desc { max-width: none; }
        }

        @media (max-width: 560px) {
            :root { --margin: 20px; --gutter: 24px; }
            h1 { font-size: 28px; }
            .form-row { grid-template-columns: 1fr; }
            .entries-table th:nth-child(n+3),
            .entries-table td:nth-child(n+3) { display: none; }
            footer { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="Monogram.png" alt="ANN Architecture Solution"></div>
    <div class="logo-name">ANN Architecture Solution</div>
</header>

<main>
    <div id="formSection" class="form-section">
        <div>
            <p class="page-label">Schaprode · Ausstellung · 2026</p>
            <h1>Trag dich<br>ins Netzwerk ein.</h1>
            <p class="page-desc">Lass uns wissen, wer du bist und wie du zum Projekt beitragen kannst.</p>
        </div>

        <div>
            <form id="networkForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Vollständiger Name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">E-Mail</label>
                        <input type="email" id="email" name="email" placeholder="deine@email.de" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Telefon</label>
                        <input type="tel" id="phone" name="phone" placeholder="+49 …">
                    </div>
                    <div class="form-group">
                        <label for="field">Berufsfeld</label>
                        <input type="text" id="field" name="field" placeholder="z.B. Architektur, Design …" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="contribution">Was kann ich beitragen</label>
                    <textarea id="contribution" name="contribution"
                        placeholder="Beschreibe kurz, womit du das Projekt bereichern kannst …" required></textarea>
                </div>

                <div class="submit-row">
                    <button type="submit" id="submitBtn">Eintragen</button>
                    <span class="status" id="statusMsg"></span>
                </div>
            </form>
        </div>
    </div>

    <div id="successScreen">
        <h2>Danke für<br>deinen Eintrag.</h2>
        <p>Wir melden uns bei dir.</p>
    </div>
</main>

<section class="entries-section">
    <div class="entries-header">
        <h2>Netzwerk</h2>
        <span class="entry-count" id="entryCount"></span>
    </div>
    <div id="entriesContainer">
        <p class="entries-status">Wird geladen …</p>
    </div>
</section>

<footer>
    <span>&copy; 2026 ANN Architecture Solution</span>
    <span>Schaprode</span>
</footer>

<script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzFkNJDCXOfx3gOLhhbdbdQRFYqnJfSSJHTUyDS-WeJwcNbo8rSOWz7Dl_xx8rPd2K5/exec';

    const form      = document.getElementById('networkForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        statusMsg.textContent = 'Wird gespeichert …';
        statusMsg.className = 'status';

        const payload = {
            timestamp:    new Date().toLocaleString('de-DE'),
            name:         document.getElementById('name').value.trim(),
            email:        document.getElementById('email').value.trim(),
            phone:        document.getElementById('phone').value.trim(),
            field:        document.getElementById('field').value.trim(),
            contribution: document.getElementById('contribution').value.trim()
        };

        try {
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            document.getElementById('formSection').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';
            setTimeout(loadEntries, 1500);

        } catch (err) {
            statusMsg.textContent = 'Verbindungsfehler — bitte versuche es erneut.';
            statusMsg.className = 'status error';
            submitBtn.disabled = false;
        }
    });

    function esc(str) {
        if (!str) return '—';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function renderEntries(data) {
        const container = document.getElementById('entriesContainer');
        const countEl   = document.getElementById('entryCount');

        if (!data || data.length === 0) {
            container.innerHTML = '<p class="entries-status">Noch keine Einträge.</p>';
            countEl.textContent = '';
            return;
        }

        countEl.textContent = data.length + (data.length === 1 ? ' Person' : ' Personen');

        let html = `<table class="entries-table">
            <thead><tr>
                <th>Name</th><th>Berufsfeld</th><th>E-Mail</th><th>Beitrag</th>
            </tr></thead><tbody>`;

        [...data].reverse().forEach(row => {
            html += `<tr>
                <td>${esc(row.name)}</td>
                <td class="muted">${esc(row.field)}</td>
                <td class="muted">${esc(row.email)}</td>
                <td class="muted">${esc(row.contribution)}</td>
            </tr>`;
        });

        html += '</tbody></table>';
        container.innerHTML = html;
    }

    async function loadEntries() {
        const container = document.getElementById('entriesContainer');
        try {
            const res  = await fetch('https://docs.google.com/spreadsheets/d/1HVc33FkfOxlVnrJ7hxp5e43JXIOD4g4OTpibIBCE3zQ/gviz/tq?tqx=out:json');
            const text = await res.text();
            const json = text.slice(text.indexOf('{'), text.lastIndexOf('}') + 1);
            const gviz = JSON.parse(json);
            const val  = (cell) => cell ? (cell.f || String(cell.v || '')) : '';
            const data = ((gviz.table || {}).rows || []).map(row => ({
                timestamp:    val(row.c[0]),
                name:         val(row.c[1]),
                email:        val(row.c[2]),
                phone:        val(row.c[3]),
                field:        val(row.c[4]),
                contribution: val(row.c[5])
            }));
            renderEntries(data);
        } catch (err) {
            container.innerHTML = '<p class="entries-status">Fehler beim Laden.</p>';
        }
    }

    loadEntries();
</script>

</body>
</html>
